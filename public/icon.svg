  <ellipse cx="256" cy="288" rx="38" ry="25" fill="#f4845f" opacity="0.6"/>
  <!-- Small garnish dots -->
  <circle cx="225" cy="310" r="8" fill="#e9c46a" opacity="0.8"/>
  <circle cx="290" cy="305" r="6" fill="#e9c46a" opacity="0.8"/>
  <circle cx="245" cy="320" r="5" fill="#264653" opacity="0.5"/>
